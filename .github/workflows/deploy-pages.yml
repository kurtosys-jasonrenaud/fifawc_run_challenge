name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable GitHub Pages
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              await github.rest.repos.getPages({ owner, repo });
              core.info('GitHub Pages is already enabled.');
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.repos.createPagesSite({
                owner,
                repo,
                build_type: 'workflow',
              });
              core.info('GitHub Pages enabled for this repository.');
            }

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
